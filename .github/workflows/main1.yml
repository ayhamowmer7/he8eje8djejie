name: Kick Streamer Optimized

on:
  workflow_dispatch: # تشغيل يدوي

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350 # أقصى مدة تشغيل مسموحة تقريباً

    steps:
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Start Streaming
        run: |
          while true; do
            ffmpeg -hide_banner -loglevel error \
            -reconnect 1 -reconnect_at_eof 1 -reconnect_streamed 1 -reconnect_delay_max 5 \
            -i 'http://tv.vibertv.online:2052/live/shaqlawatv/starz1/stream.m3u8' \
            -c:v libx264 -preset ultrafast -tune zerolatency -pix_fmt yuv420p \
            -b:v 2500k -maxrate 2500k -bufsize 5000k \
            -vf "fps=25,scale=1280:720,format=yuv420p" -g 50 \
            -c:a aac -b:a 128k -ar 44100 \
            -f flv "rtmps://fa723fc1b171.global-contribute.live-video.net:443/app/sk_us-west-2_L11KFAvrLv9S_BpVAUQCbNFA3NBvnXmhov8UEL29WmO" || echo "حدث خطأ، إعادة المحاولة..."
            
            sleep 5
          done

